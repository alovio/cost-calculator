<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; }
  body { width: 100vw; height: 100vh; overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .banner {
    position: relative; width: 100%; height: 100%; overflow: hidden;
    background: linear-gradient(120deg, #0c0a09 0%, #1a1109 52%, #9a3412 100%);
    display: flex; align-items: center; padding: 0 6.2%; gap: 3.8%; box-sizing: border-box;
  }
  .banner::before {
    content: ''; position: absolute; right: -11%; top: -36%; width: 41%; height: 128%;
    border-radius: 50%; background: radial-gradient(circle, rgba(249,115,22,.30) 0%, transparent 65%);
  }
  .text { flex: 1; position: relative; z-index: 1; }
  .brand { display: flex; align-items: center; gap: 20px; margin-bottom: 26px; }
  .mark { width: 76px; height: 76px; border-radius: 20px; flex: none;
    background: linear-gradient(135deg, #f97316, #ea580c); display: grid; place-items: center;
    box-shadow: 0 10px 30px rgba(234,88,12,.45); }
  .mark .disp { width: 44px; height: 12px; background: #fff; border-radius: 4px; margin-bottom: 7px; opacity: .95; }
  .mark .keys { display: grid; grid-template-columns: repeat(3, 11px); gap: 5.5px; }
  .mark .keys i { width: 11px; height: 11px; background: rgba(255,255,255,.92); border-radius: 3.5px; }
  .mark .keys i.acc { background: #fde68a; }
  h1 { color: #fff; font-size: 64px; font-weight: 800; letter-spacing: -1.5px; margin: 0; }
  h1 em { font-style: normal; background: linear-gradient(100deg, #f97316, #fbbf24);
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  p.tag { color: #d8cabb; font-size: 30px; font-weight: 500; margin: 0 0 30px; letter-spacing: -.3px; }
  .chips { display: flex; gap: 14px; }
  .chip { padding: 12px 22px; border-radius: 999px; font-size: 21px; font-weight: 650;
    background: rgba(249,115,22,.14); color: #fdba74; border: 1.5px solid rgba(249,115,22,.4); }
  .chip.hot { background: linear-gradient(135deg, #f97316, #ea580c); color: #fff; border-color: transparent; }
  .card { position: relative; z-index: 1; width: 30.5%; background: #fff; border-radius: 22px;
    padding: 2% 2.4%; box-shadow: 0 30px 70px rgba(0,0,0,.45); box-sizing: border-box; }
  .card .row { display: flex; justify-content: space-between; align-items: center;
    padding: 13px 0; border-bottom: 1.5px dashed #efe6df; color: #57514d; font-size: 22px; }
  .card .row b { color: #1c1917; }
  .card .slider { height: 10px; border-radius: 6px; background: #f5ede7; position: relative; margin: 18px 0; }
  .card .slider::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 58%;
    border-radius: 6px; background: linear-gradient(90deg, #f97316, #ea580c); }
  .card .slider::after { content: ''; position: absolute; left: 58%; top: 50%; width: 26px; height: 26px;
    border-radius: 50%; background: #fff; border: 3px solid #f97316; transform: translate(-50%, -50%); }
  .card .total { display: flex; justify-content: space-between; align-items: baseline; padding-top: 18px; }
  .card .total span { font-size: 23px; color: #78716c; font-weight: 650; }
  .card .total strong { font-size: 44px; color: #ea580c; font-weight: 800; letter-spacing: -1px; }
</style>
</head>
<body>
  <div class="banner">
    <div class="text">
      <div class="brand">
        <div class="mark"><div><div class="disp"></div><div class="keys"><i></i><i></i><i class="acc"></i><i></i><i class="acc"></i><i></i></div></div></div>
        <h1>Alovio <em>Calculator</em></h1>
      </div>
      <p class="tag">Cost, price &amp; quote calculator builder for WordPress</p>
      <div class="chips">
        <span class="chip hot">Conditional logic — free</span>
        <span class="chip">Decimal-safe math</span>
        <span class="chip">Lead capture</span>
      </div>
    </div>
    <div class="card">
      <div class="row"><span>Area (m²)</span><b>120</b></div>
      <div class="slider"></div>
      <div class="row"><span>Deep clean</span><b>$4.00 / m²</b></div>
      <div class="row"><span>Express (24h)</span><b>$30.00</b></div>
      <div class="total"><span>Total</span><strong>$546.00</strong></div>
    </div>
  </div>
</body>
</html>
